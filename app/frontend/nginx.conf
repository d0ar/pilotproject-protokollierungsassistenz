server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for dynamic upstream resolution (set via NGINX_RESOLVER env var)
    # Docker Compose: 127.0.0.11 (Docker embedded DNS) | K8s: kube-dns.kube-system.svc.cluster.local
    resolver ${NGINX_RESOLVER} valid=30s;

    # Proxy API requests to the backend
    # NGINX_BACKEND is set via env var: "backend:8010" (Docker Compose) or FQDN for K8s
    location /api/ {
        set $backend http://${NGINX_BACKEND};
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        client_max_body_size 500M;
    }

    # Proxy health check
    location = /health {
        set $backend http://${NGINX_BACKEND};
        proxy_pass $backend;
    }

    # Proxy root info endpoint
    location = /info {
        set $backend http://${NGINX_BACKEND};
        proxy_pass $backend/;
    }

    # Handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
