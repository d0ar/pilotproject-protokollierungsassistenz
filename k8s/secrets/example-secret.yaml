# Copy this file to secret.yaml and fill in real values:
#   cp example-secret.yaml secret.yaml
#
# Then apply:
#   kubectl apply -f secret.yaml -n tuiv
#
# IMPORTANT: secret.yaml is gitignored — never commit real secrets!
apiVersion: v1
kind: Secret
metadata:
  name: tuiv-secret
  namespace: tuiv
type: Opaque
stringData:
  LLM_API_KEY: "YOUR_AISC_API_KEY_HERE"
