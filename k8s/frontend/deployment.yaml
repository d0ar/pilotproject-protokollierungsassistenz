apiVersion: apps/v1
kind: Deployment
metadata:
  name: tuiv-frontend
  labels:
    app: tuiv-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tuiv-frontend
  template:
    metadata:
      labels:
        app: tuiv-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/aihpi/pilotproject-protokollierungsassistenz/frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
